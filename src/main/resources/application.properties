# --- General Configuration ---
spring.application.name=backend
server.port=8080

# --- Database Configuration (Neon Cloud) ---
spring.datasource.url=jdbc:postgresql://ep-floral-cloud-abglk4r7-pooler.eu-west-2.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_OeVjdw64MDAf
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Hibernate Settings ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- LoL Esports Integration ---
lolesports.auth-token=${LOLESPORTS_AUTH_TOKEN:}
lolesports.gw-base-url=${LOLESPORTS_GW_BASE_URL:https://esports-api.lolesports.com/persisted/gw}
lolesports.live-base-url=${LOLESPORTS_LIVE_BASE_URL:https://feed.lolesports.com/livestats/v1}

# --- Google OAuth ---
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}
google.oauth.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8080/api/oauth/google/callback}
google.oauth.scope=${GOOGLE_OAUTH_SCOPE:https://www.googleapis.com/auth/calendar}
google.oauth.authorization-base-url=${GOOGLE_OAUTH_AUTHORIZATION_BASE_URL:https://accounts.google.com/o/oauth2/v2/auth}
google.oauth.token-url=${GOOGLE_OAUTH_TOKEN_URL:https://oauth2.googleapis.com/token}

# --- Logging ---
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# --- Actuator / API Docs ---
management.endpoints.web.exposure.include=health
server.error.whitelabel.enabled=false
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
